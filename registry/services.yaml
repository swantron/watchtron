# watchtron service registry
# ---------------------------
# One entry per fleet service. This is the single source of truth the prober,
# the control plane, and the reusable verify workflow all read from.
#
# Fields:
#   url               Base URL probed by synthetic traffic.
#   criticalRoutes    Paths that MUST pass the health gate for a deploy to ship.
#   healthGate        Post-deploy gate thresholds. NOTE: scored over a small
#                     synthetic burst (requests x criticalRoutes), so this is a
#                     deploy health check, not a windowed production SLO.
#     availabilityPct Minimum % of probe requests that must succeed.
#     p95LatencyMs    Max allowed p95 latency across critical-route probes.
#     serverP95LatencyMs (optional, white-box) Max allowed p95 of the origin's own
#                     server-span durations (app time, excludes network/TLS).
#                     Informational unless set; gates the deploy when present.
#     p95RegressionPct (optional) % the client p95 may exceed the rolling baseline
#                     (median of recent passing runs) before it's flagged as a
#                     regression. Default 50; regression is informational unless set.
#   whiteBox          true  -> service emits server spans via @swantron/otel-bootstrap;
#                            verify also asserts a server child span landed (real end-to-end).
#                     false -> black-box only (static sites / unmodifiable upstreams).
#   expectedServiceName  service.name the white-box server reports (only when whiteBox: true).
#   mode              post-deploy -> verified by the repo's CI after each deploy.
#                     schedule    -> verified on a cron (no deploy pipeline to hook).
#   probe             (optional) per-service prober tuning. The prober falls back
#                     to global defaults; an explicit CLI flag overrides both.
#     requestsPerRoute  Requests fired per critical route (default 3).
#     timeoutMs         Per-request HTTP timeout, ms (default 10000).
#     waitMs            Max ms to wait for telemetry to land during --verify (default 30000).
#     warmup            Discarded priming requests per route, fired before the
#                       measured burst so a scaled-to-zero origin absorbs its cold
#                       start there (default 0). Gate then reflects warm latency.
#   failClosed        (optional) true -> an unreachable control plane FAILS the
#                     deploy instead of failing open with a warning (default false).

services:
  tronswan:
    url: https://tronswan.com
    host: digitalocean-app-platform
    stack: react-spa + express (esm)
    whiteBox: true
    expectedServiceName: tronswan-web
    mode: post-deploy
    criticalRoutes:
      - /
      - /projects
      - /swantron
      - /weathertron
      - /api/health
    healthGate:
      availabilityPct: 99
      p95LatencyMs: 1500

  chomptron:
    url: https://chomptron.com
    host: gcp-cloud-run
    stack: express + gemini (cjs)
    whiteBox: true
    expectedServiceName: chomptron-web
    mode: post-deploy
    criticalRoutes:
      - /
      - /health
    healthGate:
      availabilityPct: 99
      p95LatencyMs: 3000
    # Cloud Run scales to zero and throttles CPU between requests. warmup absorbs
    # the cold start so the gate measures warm p95; the generous requests/wait
    # still give the OTel batch export time to land before /verify gives up.
    probe:
      warmup: 1
      requestsPerRoute: 10
      waitMs: 25000

  swantron:
    url: https://swantron.com
    host: github-pages
    stack: hugo (static)
    whiteBox: false
    mode: post-deploy
    criticalRoutes:
      - /
      - /api/posts/index.json
    healthGate:
      availabilityPct: 99
      p95LatencyMs: 1500

  mt:
    url: https://mt.services
    host: firebase-hosting
    stack: static
    whiteBox: false
    mode: post-deploy
    criticalRoutes:
      - /
    healthGate:
      availabilityPct: 99
      p95LatencyMs: 1200

  wrenchtron:
    url: https://wrenchtron.com
    host: firebase-hosting
    stack: next.js + firestore pwa (no server)
    whiteBox: false
    mode: post-deploy
    criticalRoutes:
      - /
      - /demo
    healthGate:
      availabilityPct: 99
      p95LatencyMs: 1800

  jswan.dev:
    url: https://jswan.dev
    host: self-hosted
    stack: atproto pds (upstream bluesky, do not fork)
    whiteBox: false
    mode: schedule
    criticalRoutes:
      - /
      - /xrpc/_health
    healthGate:
      availabilityPct: 99
      p95LatencyMs: 2000

name: watchtron scheduled probes

# Probe the whole fleet on a cron so the dashboard + badges stay fresh between
# deploys (the control plane's span buffer is ephemeral, so a restart clears it)
# and so we catch silent outages — including schedule-only services like
# jswan.dev that have no deploy pipeline to hook.

on:
  schedule:
    - cron: '*/30 * * * *' # every 30 minutes
  workflow_dispatch:

jobs:
  probe:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        service: [tronswan, chomptron, swantron, mt, wrenchtron, jswan.dev]
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v5
        with:
          node-version: 24
      - run: npm install --omit=dev --workspaces --include-workspace-root
      - name: Probe + verify
        env:
          WATCHTRON_OTLP_ENDPOINT: ${{ secrets.WATCHTRON_OTLP_ENDPOINT }}
          WATCHTRON_TOKEN: ${{ secrets.WATCHTRON_TOKEN }}
        run: |
          if [ -z "$WATCHTRON_OTLP_ENDPOINT" ]; then
            echo "::notice::WATCHTRON_OTLP_ENDPOINT is not set — control plane not deployed yet. Skipping probe."
            exit 0
          fi
          node prober/src/index.js --service "${{ matrix.service }}" --wait 30000 --verify

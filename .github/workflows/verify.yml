name: watchtron verify (reusable)

# Reusable "paved road" workflow. Any fleet repo calls this after deploying to
# drive synthetic golden-signal traffic at the live URL and gate on whether the
# resulting telemetry actually landed in the watchtron control plane.
#
# Usage in a consumer repo (e.g. tronswan), after its deploy job:
#
#   verify:
#     needs: deploy
#     uses: swantron/watchtron/.github/workflows/verify.yml@main
#     with:
#       service: tronswan
#     secrets:
#       otlp_endpoint: ${{ secrets.WATCHTRON_OTLP_ENDPOINT }}
#       token: ${{ secrets.WATCHTRON_TOKEN }}

on:
  workflow_call:
    inputs:
      service:
        description: Registry service name to verify
        required: true
        type: string
      base-url:
        description: Override the registry URL (e.g. a preview deploy)
        required: false
        type: string
        default: ''
      requests:
        description: Requests per critical route
        required: false
        type: number
        default: 3
      wait:
        description: Max ms to wait for telemetry to land
        required: false
        type: number
        default: 30000
      ref:
        description: watchtron ref to run the prober from
        required: false
        type: string
        default: main
    secrets:
      otlp_endpoint:
        description: watchtron control-plane OTLP endpoint
        required: true
      token:
        description: watchtron bearer token
        required: true

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout watchtron
        uses: actions/checkout@v6
        with:
          repository: swantron/watchtron
          ref: ${{ inputs.ref }}

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: 24

      - name: Install
        run: npm install --omit=dev --workspaces --include-workspace-root

      - name: Probe + verify
        env:
          WATCHTRON_OTLP_ENDPOINT: ${{ secrets.otlp_endpoint }}
          WATCHTRON_TOKEN: ${{ secrets.token }}
        run: |
          if [ -z "$WATCHTRON_OTLP_ENDPOINT" ]; then
            echo "::notice::WATCHTRON_OTLP_ENDPOINT is not set — control plane not deployed yet. Skipping verify (not failing the deploy)."
            exit 0
          fi
          node prober/src/index.js \
            --service "${{ inputs.service }}" \
            ${{ inputs.base-url && format('--base-url {0}', inputs.base-url) || '' }} \
            --requests "${{ inputs.requests }}" \
            --wait "${{ inputs.wait }}" \
            --verify

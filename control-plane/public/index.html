<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>watchtron — fleet status</title>
    <style>
      :root {
        --bg: #0b0f14;
        --panel: #131a22;
        --panel-2: #18222c;
        --text: #e6edf3;
        --muted: #9aa7b3;
        --green: #3fb950;
        --red: #f85149;
        --amber: #d29922;
        --grey: #6e7681;
        --accent: #58a6ff;
        --border: #222d38;
      }
      * {
        box-sizing: border-box;
      }
      body {
        margin: 0;
        font:
          15px/1.5 ui-monospace,
          SFMono-Regular,
          Menlo,
          Consolas,
          monospace;
        background: var(--bg);
        color: var(--text);
      }
      header {
        padding: 28px 24px 8px;
        border-bottom: 1px solid var(--border);
      }
      h1 {
        margin: 0;
        font-size: 22px;
        letter-spacing: 0.5px;
      }
      h1 .tron {
        color: var(--accent);
      }
      .sub {
        color: var(--muted);
        margin-top: 4px;
        font-size: 13px;
      }
      main {
        padding: 24px;
        max-width: 1100px;
        margin: 0 auto;
      }
      .rollup {
        font-size: 13px;
        margin-bottom: 16px;
      }
      .rollup .ok {
        color: var(--green);
      }
      .rollup .bad {
        color: var(--red);
      }
      .rollup .warn {
        color: var(--amber);
      }
      .rollup .muted {
        color: var(--muted);
      }
      .grid {
        display: grid;
        grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
        gap: 16px;
      }
      .empty {
        color: var(--muted);
        font-size: 13px;
      }
      .card {
        background: var(--panel);
        border: 1px solid var(--border);
        border-left: 3px solid var(--grey);
        border-radius: 10px;
        padding: 16px 18px;
      }
      .card.pass {
        border-left-color: var(--green);
      }
      .card.fail {
        border-left-color: var(--red);
      }
      .card.warn {
        border-left-color: var(--amber);
      }
      .card h2 {
        margin: 0 0 2px;
        font-size: 16px;
        display: flex;
        align-items: center;
        gap: 8px;
      }
      /* Status is conveyed by glyph + word + colour (never colour alone). */
      .status {
        display: inline-flex;
        align-items: center;
        gap: 5px;
        font-size: 11px;
        font-weight: 600;
        text-transform: uppercase;
        letter-spacing: 0.4px;
        padding: 2px 8px;
        border-radius: 999px;
        border: 1px solid currentcolor;
      }
      .status .glyph {
        font-size: 12px;
      }
      .status.pass {
        color: var(--green);
      }
      .status.fail {
        color: var(--red);
      }
      .status.warn {
        color: var(--amber);
      }
      .status.unknown {
        color: var(--grey);
      }
      .name {
        font-size: 16px;
      }
      .url {
        color: var(--accent);
        text-decoration: none;
        font-size: 13px;
      }
      .url:focus-visible {
        outline: 2px solid var(--accent);
        outline-offset: 2px;
        border-radius: 3px;
      }
      .meta {
        color: var(--muted);
        font-size: 12px;
        margin: 8px 0;
      }
      .stale {
        color: var(--amber);
      }
      .tags {
        display: flex;
        flex-wrap: wrap;
        gap: 6px;
        margin: 8px 0;
      }
      .tag {
        font-size: 11px;
        padding: 2px 8px;
        border-radius: 999px;
        background: var(--panel-2);
        color: var(--muted);
        border: 1px solid var(--border);
      }
      .tag.wb {
        color: var(--accent);
        border-color: var(--accent);
      }
      .signals {
        display: flex;
        flex-wrap: wrap;
        gap: 18px;
        margin-top: 10px;
      }
      .signal .k {
        color: var(--muted);
        font-size: 11px;
        text-transform: uppercase;
      }
      .signal .v {
        font-size: 18px;
        font-weight: 600;
      }
      .signal .v.good {
        color: var(--green);
      }
      .signal .v.warn {
        color: var(--amber);
      }
      .signal .v.bad {
        color: var(--red);
      }
      .signal .v .gate {
        color: var(--muted);
        font-size: 12px;
        font-weight: 400;
      }
      .line {
        font-size: 12px;
        margin-top: 8px;
        color: var(--muted);
      }
      .line.trend.regressed {
        color: var(--amber);
      }
      .line.errs {
        color: var(--muted);
      }
      .reasons {
        margin: 10px 0 0;
        padding-left: 18px;
        font-size: 12px;
        color: var(--red);
      }
      .reasons li {
        margin: 2px 0;
      }
      /* Blended reliability strip: uptime-monitor's up/down series + watchtron deploy markers. */
      .uptime {
        margin-top: 12px;
      }
      .uptime-head {
        display: flex;
        justify-content: space-between;
        font-size: 11px;
        color: var(--muted);
        text-transform: uppercase;
        letter-spacing: 0.3px;
      }
      .strip {
        display: flex;
        gap: 2px;
        height: 22px;
        margin-top: 6px;
      }
      .cell {
        flex: 1 1 0;
        min-width: 2px;
        border-radius: 2px;
        background: var(--grey);
      }
      .cell.up {
        background: var(--green);
      }
      .cell.down {
        background: var(--red);
      }
      .markers {
        position: relative;
        height: 9px;
        margin-top: 3px;
      }
      .marker {
        position: absolute;
        top: 0;
        width: 0;
        height: 0;
        transform: translateX(-4px);
        border-left: 4px solid transparent;
        border-right: 4px solid transparent;
        border-bottom: 7px solid var(--accent);
      }
      .marker.pass {
        border-bottom-color: var(--green);
      }
      .marker.fail {
        border-bottom-color: var(--red);
      }
      footer {
        color: var(--muted);
        text-align: center;
        padding: 20px;
        font-size: 12px;
      }
      .credit {
        margin-top: 6px;
      }
      .credit a {
        color: var(--muted);
        text-decoration: none;
      }
      .credit a:hover {
        color: var(--accent);
      }
      .credit a:focus-visible {
        outline: 2px solid var(--accent);
        outline-offset: 2px;
        border-radius: 3px;
      }
      .gh {
        width: 13px;
        height: 13px;
        vertical-align: -2px;
        fill: currentcolor;
      }
    </style>
  </head>
  <body>
    <header>
      <h1>watch<span class="tron">tron</span></h1>
      <div class="sub">fleet observability paved road — synthetic traffic verified by OpenTelemetry</div>
    </header>
    <main>
      <div class="rollup" id="rollup"></div>
      <div class="grid" id="grid"><div class="empty">loading fleet status…</div></div>
    </main>
    <footer>
      <div id="footer-ops">watchtron · in-memory ephemeral telemetry · auto-refreshes every 15s</div>
      <div class="credit">
        <a href="https://github.com/swantron/watchtron" target="_blank" rel="noreferrer">
          <svg class="gh" viewBox="0 0 16 16" aria-hidden="true">
            <path
              d="M8 0C3.58 0 0 3.58 0 8c0 3.54 2.29 6.53 5.47 7.59.4.07.55-.17.55-.38 0-.19-.01-.82-.01-1.49-2.01.37-2.53-.49-2.69-.94-.09-.23-.48-.94-.82-1.13-.28-.15-.68-.52-.01-.53.63-.01 1.08.58 1.23.82.72 1.21 1.87.87 2.33.66.07-.52.28-.87.51-1.07-1.78-.2-3.64-.89-3.64-3.95 0-.87.31-1.59.82-2.15-.08-.2-.36-1.02.08-2.12 0 0 .67-.21 2.2.82.64-.18 1.32-.27 2-.27.68 0 1.36.09 2 .27 1.53-1.04 2.2-.82 2.2-.82.44 1.1.16 1.92.08 2.12.51.56.82 1.27.82 2.15 0 3.07-1.87 3.75-3.65 3.95.29.25.54.73.54 1.48 0 1.07-.01 1.93-.01 2.2 0 .21.15.46.55.38A8.01 8.01 0 0016 8c0-4.42-3.58-8-8-8z"
            />
          </svg>
          source
        </a>
        ·
        <a
          href="https://github.com/swantron/watchtron/blob/main/docs/SYSTEM.md"
          target="_blank"
          rel="noreferrer"
          >docs</a
        >
        · <a href="https://swantron.com" target="_blank" rel="noreferrer">swantron.com</a> · ©
        <span id="year"></span> swantron
      </div>
    </footer>

    <script>
      // A service is considered stale if it hasn't re-verified within this
      // window. The schedule.yml cron probes the whole fleet every 30 min, so a
      // gap beyond ~2 cycles means the refresh path (cron / deploys) is broken.
      const STALE_MS = 60 * 60 * 1000;
      // Warn (amber) when client p95 is within this fraction of the absolute gate.
      const NEAR_GATE = 0.85;

      const esc = (s) =>
        String(s == null ? '' : s).replace(
          /[&<>"']/g,
          (c) => ({ '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#39;' })[c]
        );
      const fmtPct = (n) => (n == null ? '—' : n + '%');

      function relTime(iso) {
        const s = Math.max(0, (Date.now() - new Date(iso).getTime()) / 1000);
        if (s < 60) return Math.floor(s) + 's ago';
        if (s < 3600) return Math.floor(s / 60) + 'm ago';
        if (s < 86400) return Math.floor(s / 3600) + 'h ago';
        return Math.floor(s / 86400) + 'd ago';
      }
      const isStale = (v) => v && Date.now() - new Date(v.at).getTime() > STALE_MS;

      // Health status from the last verdict: fail > warn (regressed / near-gate)
      // > pass; unknown when never verified.
      function statusOf(s) {
        const v = s.lastVerdict;
        if (!v) return 'unknown';
        if (!v.pass) return 'fail';
        const gate = s.healthGate && s.healthGate.p95LatencyMs;
        const nearGate = gate && v.p95LatencyMs > NEAR_GATE * gate;
        if ((v.baseline && v.baseline.regressed) || nearGate) return 'warn';
        return 'pass';
      }
      const GLYPH = { pass: '✓', fail: '✗', warn: '⚠', unknown: '◦' };
      const LABEL = { pass: 'pass', fail: 'fail', warn: 'degraded', unknown: 'no data' };
      const RANK = { fail: 0, unknown: 1, warn: 2, pass: 3 };

      // --- Blended uptime (from the uptime-monitor Gist) ----------------------
      // Read the public Gist directly (CORS-open, CDN-cached, not API
      // rate-limited) and join it to watchtron's fleet by hostname.
      const GIST_RAW_URL =
        'https://gist.githubusercontent.com/swantron/29651cabd005a75bac63afb74339ad74/raw/uptime.json';
      let UPTIME = null;
      let gistCache = null,
        gistAt = 0;

      const hostOf = (url) => {
        try {
          return new URL(url).hostname.replace(/^www\./, '');
        } catch {
          return '';
        }
      };

      async function getUptime() {
        // Uptime changes only every ~5 min; cache so the 15s loop doesn't hammer the Gist.
        if (gistCache && Date.now() - gistAt < 60000) return gistCache;
        try {
          const r = await fetch(GIST_RAW_URL, { cache: 'no-cache' });
          if (r.ok) {
            gistCache = await r.json();
            gistAt = Date.now();
          }
        } catch {
          /* keep last good copy */
        }
        return gistCache;
      }

      function buildUptimeIndex(uptime) {
        if (!uptime || !uptime.services) return null;
        const byHost = {};
        for (const [key, svc] of Object.entries(uptime.services)) {
          const h = hostOf(svc.url);
          if (h) byHost[h] = { svc, key, series: [] };
        }
        for (const c of uptime.checks || []) {
          for (const entry of Object.values(byHost)) {
            const r = c.results && c.results[entry.key];
            if (r) entry.series.push({ time: c.time, up: r.up, ms: r.ms });
          }
        }
        return { byHost };
      }

      function card(s) {
        const v = s.lastVerdict;
        const st = statusOf(s);
        const gate = s.healthGate && s.healthGate.p95LatencyMs;

        // p95 (client) coloured against its gate.
        let p95v = '—';
        if (v) {
          let cls = '';
          if (gate && v.p95LatencyMs > gate) cls = 'bad';
          else if (gate && v.p95LatencyMs > NEAR_GATE * gate) cls = 'warn';
          else if (gate) cls = 'good';
          p95v = `<span class="v ${cls}">${v.p95LatencyMs}<span class="gate">${gate ? ' / ' + gate : ''}ms</span></span>`;
        }
        const srv =
          v && v.serverP95LatencyMs != null
            ? `<div class="signal"><div class="k">p95 (server)</div><div class="v">${v.serverP95LatencyMs}ms</div></div>`
            : '';

        const e2e = v && v.whiteBox ? ` · e2e ${v.endToEnd ? '✓' : '✗'}` : '';
        const stale = isStale(v)
          ? ` · <span class="stale" title="last verified ${v ? new Date(v.at).toLocaleString() : ''}">stale ${relTime(v.at)}</span>`
          : '';
        const meta = v
          ? `<span title="${new Date(v.at).toLocaleString()}">${relTime(v.at)}</span>${e2e} · ${v.proberSpans} probes${stale}`
          : 'never verified';

        // Regression trend (the new baseline signal).
        const b = v && v.baseline;
        const trend =
          b && b.baselineP95 != null
            ? `<div class="line trend ${b.regressed ? 'regressed' : ''}">p95 ${b.regressionPct >= 0 ? '+' : ''}${b.regressionPct}% vs ${b.baselineP95}ms baseline${b.regressed ? ' ⚠ regression' : ''} · ${b.samples} samples</div>`
            : '';

        // Which build is live (white-box version assertion).
        const ver =
          v && v.servedVersion
            ? `<div class="line">build ${esc(String(v.servedVersion).slice(0, 7))}${v.versionMatch === true ? ' ✓' : ''}</div>`
            : '';

        // Error breakdown, only when something actually failed.
        const eb = v && v.errorBreakdown;
        const errs =
          eb && eb.http4xx + eb.http5xx + eb.transport > 0
            ? `<div class="line errs">errors — 4xx ${eb.http4xx} · 5xx ${eb.http5xx} · transport ${eb.transport}</div>`
            : '';

        const reasons =
          v && v.reasons && v.reasons.length
            ? '<ul class="reasons">' + v.reasons.map((r) => '<li>' + esc(r) + '</li>').join('') + '</ul>'
            : '';

        // Blended reliability strip: uptime-monitor's continuous up/down series
        // with watchtron's verified-deploy markers overlaid (joined by host).
        let uptimeBlock = '';
        const u = UPTIME && UPTIME.byHost[hostOf(s.url)];
        if (u && u.series.length) {
          const series = u.series.slice(-96);
          const t0 = new Date(series[0].time).getTime();
          const tN = new Date(series[series.length - 1].time).getTime();
          const span = Math.max(1, tN - t0);
          const cells = series
            .map(
              (p) =>
                `<div class="cell ${p.up === true ? 'up' : p.up === false ? 'down' : ''}" title="${new Date(p.time).toLocaleString()} · ${p.up ? 'up' : 'down'}${p.ms != null ? ' · ' + p.ms + 'ms' : ''}"></div>`
            )
            .join('');
          const markers = (s.history || [])
            .filter((h) => {
              const t = new Date(h.at).getTime();
              return t >= t0 && t <= tN;
            })
            .map((h) => {
              const left = (((new Date(h.at).getTime() - t0) / span) * 100).toFixed(2);
              return `<div class="marker ${h.pass ? 'pass' : 'fail'}" style="left:${left}%" title="deploy ${relTime(h.at)} · ${h.pass ? 'verified' : 'failed'}${h.version ? ' · ' + esc(String(h.version).slice(0, 7)) : ''}"></div>`;
            })
            .join('');
          uptimeBlock = `
            <div class="uptime">
              <div class="uptime-head"><span>uptime ${u.svc.uptimePercent}%</span><span>${u.svc.avgResponseMs}ms avg · deploys ▲</span></div>
              <div class="strip">${cells}</div>
              <div class="markers">${markers}</div>
            </div>`;
        }

        return `
          <div class="card ${st}">
            <h2>
              <span class="status ${st}" aria-label="status: ${LABEL[st]}"><span class="glyph" aria-hidden="true">${GLYPH[st]}</span>${LABEL[st]}</span>
              <span class="name">${esc(s.name)}</span>
            </h2>
            <a class="url" href="${esc(s.url)}" target="_blank" rel="noreferrer">${esc(s.url)}</a>
            <div class="tags">
              <span class="tag">${esc(s.host)}</span>
              <span class="tag ${s.whiteBox ? 'wb' : ''}">${s.whiteBox ? 'white-box' : 'black-box'}</span>
              <span class="tag">${esc(s.mode)}</span>
            </div>
            <div class="meta">${meta}</div>
            <div class="signals">
              <div class="signal"><div class="k">avail</div><div class="v">${v ? fmtPct(v.availabilityPct) : '—'}</div></div>
              <div class="signal"><div class="k">p95 (client)</div>${p95v}</div>
              ${srv}
            </div>
            ${uptimeBlock}
            ${trend}
            ${ver}
            ${errs}
            ${reasons}
          </div>`;
      }

      function rollup(services) {
        const total = services.length;
        let passing = 0,
          failing = 0,
          unknown = 0,
          regressed = 0,
          stale = 0;
        for (const s of services) {
          const v = s.lastVerdict;
          if (!v) unknown++;
          else if (v.pass) passing++;
          else failing++;
          if (v && v.pass && v.baseline && v.baseline.regressed) regressed++;
          if (isStale(v)) stale++;
        }
        let html = `<span class="${failing ? 'warn' : 'ok'}">${passing}/${total} healthy</span>`;
        if (failing) html += `<span class="bad"> · ${failing} failing</span>`;
        if (unknown) html += `<span class="muted"> · ${unknown} unverified</span>`;
        if (regressed) html += `<span class="warn"> · ${regressed} regressed</span>`;
        if (stale) html += `<span class="warn"> · ${stale} stale</span>`;
        html += `<span class="muted"> · updated ${new Date().toLocaleTimeString()}</span>`;
        return html;
      }

      function fmtUptime(sec) {
        if (sec == null) return null;
        const d = Math.floor(sec / 86400),
          h = Math.floor((sec % 86400) / 3600),
          m = Math.floor((sec % 3600) / 60);
        if (d) return `up ${d}d ${h}h`;
        if (h) return `up ${h}h ${m}m`;
        return `up ${m}m`;
      }

      async function load() {
        try {
          // Status is required; health (for uptime) is best-effort.
          const [statusRes, healthRes] = await Promise.all([
            fetch('/api/status'),
            fetch('/healthz').catch(() => null),
          ]);
          const data = await statusRes.json();
          let up = '';
          if (healthRes && healthRes.ok) {
            try {
              const u = fmtUptime((await healthRes.json()).uptimeSec);
              if (u) up = ` · ${u}`;
            } catch {
              /* leave uptime off */
            }
          }
          UPTIME = buildUptimeIndex(await getUptime());
          const services = [...data.services].sort((a, b) => RANK[statusOf(a)] - RANK[statusOf(b)]);
          document.getElementById('grid').innerHTML = services.length
            ? services.map(card).join('')
            : '<div class="empty">no services in the registry</div>';
          document.getElementById('rollup').innerHTML = rollup(data.services);
          document.getElementById('footer-ops').textContent =
            `watchtron${up} · ${data.buffer.total} spans buffered (in-memory, ephemeral) · auto-refreshes every 15s`;
        } catch (e) {
          document.getElementById('rollup').innerHTML =
            `<span class="bad">failed to load status</span><span class="muted"> · ${esc(e.message || e)} · retrying…</span>`;
        }
      }
      document.getElementById('year').textContent = new Date().getFullYear();
      load();
      setInterval(load, 15000);
    </script>
  </body>
</html>
